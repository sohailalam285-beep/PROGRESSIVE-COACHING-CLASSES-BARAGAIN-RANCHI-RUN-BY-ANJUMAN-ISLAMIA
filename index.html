<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCC Baragain - Smart Accounts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a2a3a; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--accent); }
        .container { padding: 10px; max-width: 99%; margin: 10px auto; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 180px; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; gap: 5px; }
        .login-btn { background: #34495e; }
        .add-btn { background: var(--success); display: none; }
        .save-btn { background: #e67e22; display: none; }
        .sync-status { text-align: center; font-size: 13px; margin-bottom: 10px; font-weight: bold; }
        .table-box { overflow-x: auto; border: 1px solid #eee; border-radius: 8px; height: 600px; }
        table { width: 100%; border-collapse: collapse; min-width: 2200px; }
        th { background: #f8f9fa; position: sticky; top: 0; z-index: 10; padding: 12px; border: 1px solid #eee; font-size: 13px; }
        td { border: 1px solid #eee; padding: 8px; text-align: center; font-size: 12px; }
        .paid-cell { background: #e6fffa; color: #2c7a7b; font-weight: bold; border-left: 3px solid #27ae60 !important; }
        .unpaid-cell { background: #fff5f5; color: #c53030; }
        .account-box { background: #ebf4ff; font-weight: bold; color: #2b6cb0; }
        .balance-box { background: #fffaf0; color: #9c4221; font-weight: bold; }
        .date-badge { font-size: 9px; color: #7f8c8d; display: block; margin-top: 3px; }
        .total-row { background: #1a2a3a !important; color: white; font-weight: bold; position: sticky; bottom: 0; }
        .wa-btn { background: #25D366; color: white; padding: 4px 8px; border-radius: 5px; text-decoration: none; font-size: 11px; display: inline-block; }
        .del-btn { background: var(--danger); color: white; padding: 4px 8px; border-radius: 5px; border: none; font-size: 11px; cursor: pointer; margin-left: 5px; }
        .edit-btn { background: #9b59b6; color: white; padding: 4px 8px; border-radius: 5px; border: none; font-size: 11px; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

<header>
    <h1>Progressive Coaching Classes</h1>
    <p>Baragain, Ranchi | Fees & Student Management</p>
</header>

<div class="container">
    <div id="syncStatus" class="sync-status">🔄 Connecting...</div>
    <div class="controls">
        <button id="authBtn" class="btn login-btn" onclick="toggleLogin()"><i class="fas fa-lock"></i> Admin Login</button>
        <input type="text" id="searchBox" onkeyup="filterTable()" placeholder="Search Name/Roll...">
        <button id="addBtn" class="btn add-btn" onclick="addNewStudent()"><i class="fas fa-user-plus"></i> Add Student</button>
        <button id="saveBtn" class="btn save-btn" onclick="saveToCloud()"><i class="fas fa-save"></i> Save & Sync</button>
    </div>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>Action</th><th>Roll</th><th>Name</th><th>Class</th>
                    <th style="background:#edf2f7">Yearly Fee</th>
                    <th style="background:#e6fffa">Total Paid</th>
                    <th style="background:#fffaf0">Due Balance</th>
                    <th>Apr</th><th>May</th><th>Jun</th><th>Jul</th><th>Aug</th><th>Sep</th><th>Oct</th><th>Nov</th><th>Dec</th><th>Jan</th><th>Feb</th><th>Mar</th>
                </tr>
            </thead>
            <tbody id="studentData"></tbody>
            <tfoot id="totalRow"></tfoot>
        </table>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzS7COvAmzH9Z7Y1S8BtvfP5j_K8buk44bKu6FaUw-3odVbSdD3XGNVJOvLktKRyzUtpA/exec"; 
    
    let isAdmin = false;
    let students = [];
    const months = ["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"];

    async function loadData() {
        try {
            const response = await fetch(SCRIPT_URL);
            const rawData = await response.json();
            if (rawData.length > 1) {
                students = rawData.slice(1).map(row => ({
                    roll: row[0], name: row[1], phone: row[2], class: row[3],
                    totalFee: Number(row[5]) || 0,
                    fees: row[4] ? JSON.parse(row[4]) : {}
                }));
            }
            document.getElementById('syncStatus').innerHTML = "<span style='color:green'>● Connected</span>";
            renderTable();
        } catch (e) { document.getElementById('syncStatus').innerHTML = "<span style='color:red'>❌ Error</span>"; }
    }

    function renderTable() {
        const tbody = document.getElementById('studentData');
        tbody.innerHTML = students.map((s, idx) => {
            let paidSum = months.reduce((sum, m) => sum + (Number(s.fees[m]?.amount) || 0), 0);
            let balance = s.totalFee - paidSum;
            
            let rowHtml = `<tr>
                <td>
                    <a href="https://wa.me/91${s.phone}" target="_blank" class="wa-btn"><i class="fab fa-whatsapp"></i> Chat</a>
                    ${isAdmin ? `<button class="edit-btn" onclick="editStudent(${idx})"><i class="fas fa-edit"></i></button>` : ''}
                    ${isAdmin ? `<button class="del-btn" onclick="deleteStudent(${idx})"><i class="fas fa-trash"></i></button>` : ''}
                </td>
                <td>${s.roll}</td><td><strong>${s.name}</strong></td><td>${s.class}</td>
                <td class="account-box">₹${s.totalFee}</td>
                <td class="paid-cell">₹${paidSum}</td>
                <td class="balance-box">₹${balance}</td>`;
            
            months.forEach(m => {
                const f = s.fees[m] || {status: 'Unpaid', amount: 0, date: ''};
                rowHtml += `<td class="${f.status === 'Paid' ? 'paid-cell' : 'unpaid-cell'}" onclick="handleFee(${idx},'${m}')" style="cursor:pointer">
                    ${f.status === 'Paid' ? 'PAID ✔' : 'UNPAID ❌'}<br>
                    ${f.amount > 0 ? '₹'+f.amount : ''}
                    ${f.date ? `<span class="date-badge">${f.date}</span>` : ''}
                </td>`;
            });
            return rowHtml + `</tr>`;
        }).join('');
        updateTotals();
    }

    function deleteStudent(idx) {
        if (confirm(`Kya aap sach mein ${students[idx].name} ko delete karna chahte hain?`)) {
            students.splice(idx, 1);
            renderTable();
            alert("Delete ho gaya! 'Save & Sync' dabana na bhulein.");
        }
    }

    function editStudent(idx) {
        const s = students[idx];
        const newName = prompt("Naya Naam:", s.name);
        const newFee = prompt("Nayi Yearly Fee:", s.totalFee);
        const newPhone = prompt("Naya Phone:", s.phone);
        if (newName && newFee) {
            students[idx].name = newName;
            students[idx].totalFee = Number(newFee);
            students[idx].phone = newPhone;
            renderTable();
        }
    }

    function handleFee(idx, m) {
        if (!isAdmin) return;
        if (!students[idx].fees) students[idx].fees = {};
        const f = students[idx].fees[m] || {status: 'Unpaid', amount: 0, date: ''};
        
        if (f.status === 'Unpaid') {
            const amt = prompt(`${students[idx].name} (${m}) Amount:`);
            if (amt !== null && amt !== "" && !isNaN(amt)) {
                const today = new Date().toLocaleDateString('en-GB');
                students[idx].fees[m] = { status: 'Paid', amount: Number(amt), date: today };
                renderTable();
            }
        } else {
            if(confirm("Wapas Unpaid karein?")) {
                students[idx].fees[m] = { status: 'Unpaid', amount: 0, date: '' };
                renderTable();
            }
        }
    }

    function updateTotals() {
        let html = `<tr class="total-row"><td colspan="7">MONTHLY COLLECTION</td>`;
        months.forEach(m => {
            let colSum = students.reduce((sum, s) => sum + (Number(s.fees[m]?.amount) || 0), 0);
            html += `<td>₹${colSum}</td>`;
        });
        document.getElementById('totalRow').innerHTML = html + `</tr>`;
    }

    async function saveToCloud() {
        const btn = document.getElementById('saveBtn');
        btn.innerHTML = "Saving...";
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(students) });
            alert("Safe! Data Google Sheet mein chala gaya.");
            btn.innerHTML = "Save & Sync";
        } catch (e) { alert("Save Error!"); }
    }

    function toggleLogin() {
        if (!isAdmin) {
            if (prompt("Admin Password:") === "admin123") {
                isAdmin = true;
                document.getElementById('addBtn').style.display = "inline-block";
                document.getElementById('saveBtn').style.display = "inline-block";
                renderTable();
            }
        } else { location.reload(); }
    }

    function addNewStudent() {
        const n = prompt("Name:"), r = prompt("Roll:"), p = prompt("Phone:"), c = prompt("Class:"), tf = prompt("Yearly Fee:", "6000");
        if (n && r) { 
            students.push({roll:r, name:n, phone:p, class:c, totalFee: Number(tf), fees:{}}); 
            renderTable(); 
        }
    }

    function filterTable() {
        const val = document.getElementById('searchBox').value.toLowerCase();
        document.querySelectorAll('#studentData tr').forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(val) ? '' : 'none';
        });
    }

    window.onload = loadData;
</script>
</body>
</html>
