<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCC Baragain - Live Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a2a3a; --accent: #3498db; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--accent); }
        .container { padding: 15px; max-width: 98%; margin: 15px auto; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 250px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .login-btn { background: #34495e; }
        .add-btn { background: var(--success); display: none; }
        .save-btn { background: #e67e22; display: none; }
        .sync-status { text-align: center; font-size: 13px; color: #7f8c8d; margin-bottom: 10px; font-weight: bold; }
        .table-box { overflow-x: auto; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 1600px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; font-size: 13px; }
        th { background: #f8f9fa; position: sticky; top: 0; }
        .paid { background: #e6fffa; color: #2c7a7b; font-weight: bold; }
        .unpaid { background: #fff5f5; color: #c53030; }
    </style>
</head>
<body>

<header>
    <h1>Progressive Coaching Classes</h1>
    <p>Baragain, Ranchi | Live Cloud Database</p>
</header>

<div class="container">
    <div id="syncStatus" class="sync-status"><i class="fas fa-cloud"></i> Connecting to Cloud...</div>
    <div class="controls">
        <button id="authBtn" class="btn login-btn" onclick="toggleLogin()">Admin Login</button>
        <input type="text" id="searchBox" onkeyup="filterTable()" placeholder="Roll ya Naam search karein...">
        <button id="addBtn" class="btn add-btn" onclick="addNewStudent()">+ Naya Student</button>
        <button id="saveBtn" class="btn save-btn" onclick="saveToCloud()">Save to Cloud (Live)</button>
    </div>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>Roll</th><th>Name</th><th>Phone</th><th>Class</th>
                    <th>Apr</th><th>May</th><th>Jun</th><th>Jul</th><th>Aug</th><th>Sep</th><th>Oct</th><th>Nov</th><th>Dec</th><th>Jan</th><th>Feb</th><th>Mar</th>
                </tr>
            </thead>
            <tbody id="studentData"></tbody>
        </table>
    </div>
</div>

<script>
    // Maine aapka link yahan pehle se daal diya hai
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJnUsOkYbr7u6wS7rL99O3U_tE3X-Uv9G0-uN-yF6kU5-I5E6_zI6eE/exec"; 
    
    let isAdmin = false;
    let students = [];
    const months = ["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"];

    async function loadData() {
        try {
            const response = await fetch(SCRIPT_URL);
            const rawData = await response.json();
            if (rawData.length > 1) {
                students = rawData.slice(1).map(row => ({
                    roll: row[0], name: row[1], phone: row[2], class: row[3],
                    fees: row[4] ? JSON.parse(row[4]) : {}
                }));
            }
            document.getElementById('syncStatus').innerHTML = "<span style='color:green'><i class='fas fa-check-circle'></i> Data Live Hai!</span>";
            renderTable();
        } catch (e) {
            document.getElementById('syncStatus').innerText = "Data Load Ho Raha Hai...";
        }
    }

    async function saveToCloud() {
        const btn = document.getElementById('saveBtn');
        btn.innerText = "Saving...";
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(students)
            });
            alert("Data Google Sheet mein save ho gaya!");
            btn.innerText = "Save to Cloud (Live)";
        } catch (e) { alert("Save Error!"); }
    }

    function toggleLogin() {
        if (!isAdmin) {
            if (prompt("Admin Password:") === "admin123") {
                isAdmin = true;
                document.getElementById('authBtn').innerText = "Logout";
                document.getElementById('addBtn').style.display = "inline-block";
                document.getElementById('saveBtn').style.display = "inline-block";
                renderTable();
            }
        } else { location.reload(); }
    }

    function renderTable() {
        const tbody = document.getElementById('studentData');
        tbody.innerHTML = students.map((s, idx) => `
            <tr>
                <td>${s.roll}</td><td><strong>${s.name}</strong></td><td>${s.phone}</td><td>${s.class}</td>
                ${months.map(m => {
                    const f = s.fees[m] || {status: 'Unpaid', amount: 0};
                    return `<td class="${f.status === 'Paid' ? 'paid' : 'unpaid'}" onclick="handleFee(${idx},'${m}')" style="cursor:pointer">
                        ${f.status}<br><small>${f.amount > 0 ? '₹'+f.amount : ''}</small>
                    </td>`;
                }).join('')}
            </tr>
        `).join('');
    }

    function handleFee(idx, m) {
        if (!isAdmin) return;
        if (!students[idx].fees) students[idx].fees = {};
        if (!students[idx].fees[m]) students[idx].fees[m] = {status: 'Unpaid', amount: 0};
        const f = students[idx].fees[m];
        if (f.status === 'Unpaid') {
            const amt = prompt("Amount:", "500");
            if (amt) { f.status = 'Paid'; f.amount = amt; }
        } else { f.status = 'Unpaid'; f.amount = 0; }
        renderTable();
    }

    function addNewStudent() {
        const n = prompt("Name:"), r = prompt("Roll:"), p = prompt("Phone:"), c = prompt("Class:");
        if (n && r) {
            let f = {}; months.forEach(m => f[m] = {status:'Unpaid', amount:0});
            students.push({roll:r, name:n, phone:p, class:c, fees:f});
            renderTable();
        }
    }

    function filterTable() {
        const val = document.getElementById('searchBox').value.toLowerCase();
        document.querySelectorAll('#studentData tr').forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(val) ? '' : 'none';
        });
    }

    window.onload = loadData;
</script>
</body>
</html>
