<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressive Coaching Classes - Fee Record</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-top: 8px solid #2c3e50; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #f1f1f1; padding-bottom: 15px; }
        .header h1 { color: #2c3e50; margin: 0; font-size: 26px; }
        .header p { color: #7f8c8d; font-weight: bold; margin: 5px 0; }
        
        .controls { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        .search-box input { padding: 12px; width: 280px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .add-btn { background: #27ae60; }
        .print-btn { background: #3498db; }
        .btn:hover { opacity: 0.8; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #34495e; color: white; font-size: 14px; }
        
        .status-btn { cursor: pointer; padding: 8px; border-radius: 5px; font-weight: bold; display: block; margin-bottom: 4px; border: 1px solid transparent; }
        .paid { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        .unpaid { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .pay-date { display: block; font-size: 10px; color: #666; font-weight: normal; margin-top: 2px; }

        .delete-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        @media print {
            .controls, .delete-btn, th:last-child, td:last-child { display: none; }
            body { padding: 0; background: white; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Progressive Coaching Classes, Baragain</h1>
        <p>Run by: Anjuman Islamia Baragain, Ranchi</p>
    </div>
    
    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="searchStudent()" placeholder="Search Student Name or Roll No...">
        </div>
        <div>
            <button class="btn add-btn" onclick="addStudent()">+ Add New Student</button>
            <button class="btn print-btn" onclick="window.print()">Print Report</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Roll No</th>
                <th>Student Name</th>
                <th>Class</th>
                <th>January</th>
                <th>February</th>
                <th>March</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // Local Storage se data uthana ya empty array set karna
    let students = JSON.parse(localStorage.getItem('coachingData')) || [
        { roll: "101", name: "Anas", class: "10th", fees: { Jan: {status: "Unpaid", date: ""}, Feb: {status: "Unpaid", date: ""}, Mar: {status: "Unpaid", date: ""} } },
        { roll: "102", name: "Laiba", class: "8th", fees: { Jan: {status: "Unpaid", date: ""}, Feb: {status: "Unpaid", date: ""}, Mar: {status: "Unpaid", date: ""} } }
    ];

    function saveData() {
        localStorage.setItem('coachingData', JSON.stringify(students));
        loadData();
    }

    function loadData() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = students.map((s, sIndex) => `
            <tr>
                <td>${s.roll}</td>
                <td><strong>${s.name}</strong></td>
                <td>${s.class}</td>
                ${['Jan', 'Feb', 'Mar'].map(month => `
                    <td>
                        <div class="status-btn ${s.fees[month].status.toLowerCase()}" onclick="toggleFee(${sIndex}, '${month}')">
                            ${s.fees[month].status}
                            <span class="pay-date">${s.fees[month].date}</span>
                        </div>
                    </td>
                `).join('')}
                <td><button class="delete-btn" onclick="deleteStudent(${sIndex})">Remove</button></td>
            </tr>
        `).join('');
    }

    function toggleFee(index, month) {
        let currentStatus = students[index].fees[month].status;
        if (currentStatus === "Unpaid") {
            students[index].fees[month].status = "Paid";
            let today = new Date();
            students[index].fees[month].date = today.getDate().toString().padStart(2, '0') + '-' + 
                                               (today.getMonth() + 1).toString().padStart(2, '0') + '-' + 
                                               today.getFullYear();
        } else {
            students[index].fees[month].status = "Unpaid";
            students[index].fees[month].date = "";
        }
        saveData();
    }

    function addStudent() {
        let name = prompt("Student Name:");
        let roll = prompt("Roll Number:");
        let cls = prompt("Class (e.g. 10th):");
        
        if(name && roll) {
            students.push({ 
                roll: roll, name: name, class: cls, 
                fees: { 
                    Jan: {status: "Unpaid", date: ""}, 
                    Feb: {status: "Unpaid", date: ""}, 
                    Mar: {status: "Unpaid", date: ""} 
                } 
            });
            saveData();
        }
    }

    function deleteStudent(index) {
        if(confirm("Kya aap is student ka record delete karna chahte hain?")) {
            students.splice(index, 1);
            saveData();
        }
    }

    function searchStudent() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let rows = document.querySelectorAll('#tableBody tr');
        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(input) ? '' : 'none';
        });
    }

    window.onload = loadData;
</script>

</body>
</html>
