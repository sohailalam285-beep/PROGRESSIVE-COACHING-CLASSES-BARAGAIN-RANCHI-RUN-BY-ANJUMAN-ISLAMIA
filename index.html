<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressive Coaching - Admin Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-top: 8px solid #2c3e50; }
        .header { text-align: center; margin-bottom: 20px; }
        
        .controls { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px; align-items: center; }
        .search-box input { padding: 10px; width: 250px; border: 1px solid #ddd; border-radius: 6px; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .add-btn { background: #27ae60; display: none; } /* Hide by default */
        .login-btn { background: #2c3e50; }
        .print-btn { background: #3498db; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #34495e; color: white; }
        
        .status-btn { padding: 6px; border-radius: 4px; font-weight: bold; display: block; margin-bottom: 4px; border: 1px solid transparent; }
        .paid { background: #d4edda; color: #155724; }
        .unpaid { background: #f8d7da; color: #721c24; }
        .admin-only { display: none; } /* Hide edit options */

        .delete-btn { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Progressive Coaching Classes, Baragain</h1>
        <p>Run by: Anjuman Islamia Baragain, Ranchi</p>
        <button id="authBtn" class="btn login-btn" onclick="handleAuth()">Admin Login</button>
    </div>
    
    <div class="controls">
        <input type="text" id="searchInput" onkeyup="searchStudent()" placeholder="Search Name or Roll No..." class="search-box">
        <div>
            <button id="addBtn" class="btn add-btn" onclick="addStudent()">+ Add Student</button>
            <button class="btn print-btn" onclick="window.print()">Print</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Roll No</th>
                <th>Name</th>
                <th>Class</th>
                <th>Jan</th>
                <th>Feb</th>
                <th>Mar</th>
                <th class="admin-only">Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let isAdmin = false;
    const ADMIN_PASSWORD = "admin123"; // Aap ise yahan badal sakte hain

    let students = JSON.parse(localStorage.getItem('coachingData')) || [
        { roll: "101", name: "Anas", class: "10th", fees: { Jan: {status: "Unpaid", date: ""}, Feb: {status: "Unpaid", date: ""}, Mar: {status: "Unpaid", date: ""} } }
    ];

    function handleAuth() {
        if (!isAdmin) {
            let pass = prompt("Admin Password daalein:");
            if (pass === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById('authBtn').innerText = "Logout";
                document.getElementById('authBtn').style.background = "#e67e22";
                alert("Welcome Admin! Ab aap edit kar sakte hain.");
            } else {
                alert("Galat Password!");
            }
        } else {
            isAdmin = false;
            document.getElementById('authBtn').innerText = "Admin Login";
            document.getElementById('authBtn').style.background = "#2c3e50";
        }
        loadData();
    }

    function loadData() {
        // Edit options show/hide karna
        document.getElementById('addBtn').style.display = isAdmin ? 'inline-block' : 'none';
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'table-cell' : 'none');

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = students.map((s, sIndex) => `
            <tr>
                <td>${s.roll}</td>
                <td><strong>${s.name}</strong></td>
                <td>${s.class}</td>
                ${['Jan', 'Feb', 'Mar'].map(month => `
                    <td>
                        <div class="status-btn ${s.fees[month].status.toLowerCase()}" 
                             style="cursor: ${isAdmin ? 'pointer' : 'default'}"
                             onclick="${isAdmin ? `toggleFee(${sIndex}, '${month}')` : ''}">
                            ${s.fees[month].status}
                            <div style="font-size:10px">${s.fees[month].date}</div>
                        </div>
                    </td>
                `).join('')}
                <td class="admin-only">
                    <button class="delete-btn" onclick="deleteStudent(${sIndex})">Remove</button>
                </td>
            </tr>
        `).join('');
    }

    // ... (toggleFee, addStudent, deleteStudent, searchStudent functions same rahenge)
    function toggleFee(index, month) {
        if(!isAdmin) return;
        let s = students[index].fees[month];
        if (s.status === "Unpaid") {
            s.status = "Paid";
            s.date = new Date().toLocaleDateString('en-GB');
        } else {
            s.status = "Unpaid";
            s.date = "";
        }
        saveData();
    }

    function saveData() {
        localStorage.setItem('coachingData', JSON.stringify(students));
        loadData();
    }

    function addStudent() {
        let n = prompt("Name:"), r = prompt("Roll:"), c = prompt("Class:");
        if(n && r) {
            students.push({ roll: r, name: n, class: c, fees: { Jan: {status: "Unpaid", date: ""}, Feb: {status: "Unpaid", date: ""}, Mar: {status: "Unpaid", date: ""} } });
            saveData();
        }
    }

    function deleteStudent(i) {
        if(confirm("Delete?")) { students.splice(i, 1); saveData(); }
    }

    function searchStudent() {
        let val = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('#tableBody tr').forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? '' : 'none');
    }

    window.onload = loadData;
</script>
</body>
</html>
